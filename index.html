    ctx.fillStyle = SHAPES[it.idx].color;
    for (const o of nr.cells) ctx.fillRect(it.x + o.dx * it.s, it.y + o.dy * it.s, it.s - 2, it.s - 2);
  }
  ctx.restore();
}

// ---------------------------------------------------------------------------
// Attract demo: after ATTRACT_MS idle on the title, a self-playing zen-style
// flight runs behind the overlay. Its own tiny world (piece, grid, no pipes),
// so it can never touch real state or records. Any input dismisses it.
// ---------------------------------------------------------------------------

const attract = { on: false, grid: null, piece: null, lastT: 0 };

function attractReset() {
  attract.grid = makeEmptyGrid();
  attract.piece = null;
}

function attractSpawn() {
  const idx = Math.floor(Math.random() * SHAPES.length);
  const rot = Math.floor(Math.random() * 4);
  const def = SHAPES[idx].rotations[rot];
  // aim for the column with the deepest real resting row, using the same
  // cell-accurate placement rules as gameplay so demo stacks are legal
  let bestCol = -1, bestRow = -1;
  for (let c0 = 0; c0 <= WELL_COLS - def.w; c0++) {
    const r = restingRow(idx, rot, c0, 0, attract.grid);
    if (r !== null && r > bestRow) { bestRow = r; bestCol = c0; }
  }
  // a demo well too tall to land in sweeps clean and tries again
  if (bestCol < 0 || bestRow < 3) {
    attractReset();
    attractSpawn();
    return;
  }
  attract.piece = {
    shapeIndex: idx, rot: rot, targetCol: bestCol, targetRow: bestRow,
    x: -80, y: 120 + Math.random() * 280, vy: 0, glide: false,
  };
}

function attractStep(dt) {
  if (!attract.grid) attractReset();
  if (!attract.piece) attractSpawn();
  const p = attract.piece;
  const def = SHAPES[p.shapeIndex].rotations[p.rot];
  const tx = WELL_X + p.targetCol * CELL;
  const ty = WELL_Y + p.targetRow * CELL;
  if (p.glide) {
    // the real landing feel constants, so a retune reaches the demo too
    const mx = CONFIG.SETTLE_SLIDE * dt, my = CONFIG.SETTLE_DROP * dt;
    const dx = tx - p.x, dy = ty - p.y;
    p.x = Math.abs(dx) <= mx ? tx : p.x + Math.sign(dx) * mx;
    p.y = Math.abs(dy) <= my ? ty : p.y + Math.sign(dy) * my;
    if (p.x === tx && p.y === ty) {
      for (const o of def.cells) {
        attract.grid[p.targetRow + o.dy][p.targetCol + o.dx] = SHAPES[p.shapeIndex].color;
      }
      attract.piece = null;
    }
    return;
  }
  // flight: the game's starting scroll and physics, bang-bang auto flaps
  // toward the landing height. No pipes, so the demo can never crash.
  p.x += CONFIG.SCROLL_START * dt;
  p.vy = Math.min(p.vy + CONFIG.GRAVITY * dt, CONFIG.TERMINAL_VY);
  p.y += p.vy * dt;
  if (p.vy > 0 && p.y > Math.min(ty - 70, CONFIG.LOGICAL_H - 130)) {
    p.vy = CONFIG.FLAP_VY * 0.85;
  }
  if (p.y < 30) { p.y = 30; p.vy = Math.max(p.vy, 0); }
  if (p.x >= WELL_X - CELL) p.glide = true;
}

function drawAttract() {
  ctx.save();
  ctx.globalAlpha = 0.5;
  for (let r = 0; r < WELL_ROWS; r++) {
    for (let c = 0; c < WELL_COLS; c++) {
      const color = attract.grid[r][c];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(WELL_X + c * CELL, WELL_Y + r * CELL, CELL, CELL);
      }
    }
  }
  const p = attract.piece;
  if (p) {
    const def = SHAPES[p.shapeIndex].rotations[p.rot];
    ctx.fillStyle = SHAPES[p.shapeIndex].color;
    for (const o of def.cells) ctx.fillRect(p.x + o.dx * CELL, p.y + o.dy * CELL, CELL, CELL);
  }
  ctx.restore();
}

// faint parallax backdrop in the flight zone: distant dots and haze bands
// scrolling slower than the action. Pure ambience, static under reduced motion.
const backdrop = { stars: [], clouds: [], scroll: 0, lastT: 0 };
function drawBackdrop() {
  if (backdrop.stars.length === 0) {
    for (let i = 0; i < 40; i++) {
      backdrop.stars.push({
        x: Math.random() * WELL_X, y: Math.random() * CONFIG.LOGICAL_H,
        s: 1 + Math.random() * 1.6, f: 0.15 + Math.random() * 0.2,
      });
    }
    for (let i = 0; i < 6; i++) {
      const w = 90 + Math.random() * 130;
      backdrop.clouds.push({
        x: Math.random() * WELL_X, y: 30 + Math.random() * (CONFIG.LOGICAL_H - 90),
        w: w, h: 14 + Math.random() * 18,
        f: 0.4 + Math.random() * 0.25,
        range: WELL_X + w, // wrap span, fixed at spawn
      });
    }
  }
  const now = performance.now();
  const dt = backdrop.lastT ? Math.min(0.05, (now - backdrop.lastT) / 1000) : 0.016;
  backdrop.lastT = now;
  if (!REDUCED_MOTION && game.state === 'FLYING') backdrop.scroll += game.scrollSpeed * dt;
  ctx.save();
  ctx.fillStyle = CONFIG.INK;
  ctx.globalAlpha = 0.10;
  for (const st of backdrop.stars) {
    const x = ((st.x - backdrop.scroll * st.f) % WELL_X + WELL_X) % WELL_X;
    ctx.fillRect(x, st.y, st.s, st.s);
  }
  ctx.globalAlpha = 0.045;
  for (const cl of backdrop.clouds) {
    const x = ((cl.x - backdrop.scroll * cl.f) % cl.range + cl.range) % cl.range - cl.w;
    ctx.fillRect(x, cl.y, cl.w, cl.h);
  }
  ctx.restore();
}

// afterimages behind the piece once the scroll is fast enough to feel it
function drawTrail() {
  if (REDUCED_MOTION || game.settle || !game.piece) return;
  if (game.scrollSpeed < CONFIG.TRAIL_MIN_SPEED || game.trail.length === 0) return;
  ctx.save();
  ctx.fillStyle = SHAPES[game.piece.shapeIndex].color;
  for (let k = 1; k <= 3; k++) {
    const ix = game.trail.length - 1 - k * 3;
    if (ix < 0) break;
    ctx.globalAlpha = 0.10 - k * 0.025;
    for (const b of game.trail[ix]) ctx.fillRect(b.x, b.y, CELL, CELL);
  }
  ctx.restore();
}

  if (!game.tut) return;

// top-center banners (badge unlocks): slide in, hold, fade
function drawToasts() {
  if (game.toasts.length === 0) return;
  const now = performance.now();
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 15px ' + MONO;
  let shown = 0;
  game.toasts = game.toasts.filter(tb => {
    const t = (now - tb.at) / 2600;
    if (t >= 1) return false;
    const slide = Math.min(1, t * 8);
    const fade = t > 0.85 ? (1 - t) / 0.15 : 1;
    const y = -20 + slide * (36 + shown * 32);
    const w = tb.text.length * 9.5 + 36;
    ctx.globalAlpha = 0.92 * fade;
    ctx.fillStyle = 'rgba(20,25,34,0.95)';
    ctx.fillRect(CONFIG.LOGICAL_W / 2 - w / 2, y - 14, w, 28);
    ctx.strokeStyle = '#E8B84C';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(CONFIG.LOGICAL_W / 2 - w / 2, y - 14, w, 28);
    ctx.fillStyle = CONFIG.INK;
    ctx.fillText(tb.text, CONFIG.LOGICAL_W / 2, y + 1);
    shown++;
    return true;
  });
  ctx.restore();
}

// draw a clickable button and register its rect for the mousedown hit test.
// Invisible buttons make plain text lines (history rows) clickable too.
function uiButton(x, y, w, h, label, action, opts) {
  opts = opts || {};
  game.uiButtons.push({ x: x, y: y, w: w, h: h, action: action });
  if (opts.invisible) return;

  ctx.fillStyle = opts.active ? 'rgba(237,232,220,0.18)' : 'rgba(237,232,220,0.06)';
  ctx.fillRect(x, y, w, h);

  ctx.globalAlpha = opts.active ? 1 : 0.45;

  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = CONFIG.INK;
  ctx.textAlign = 'center';

// lay out a centered row of buttons; defs are [label, action, extraOpts?]
function uiButtonRow(y, defs, w, h, gap, opts) {
  let x = (CONFIG.LOGICAL_W - (defs.length * w + (defs.length - 1) * gap)) / 2;

function render() {
  // clickable rects are re-registered by whichever overlays draw this frame
  game.uiButtons.length = 0;

  // letterbox: clear the whole backing store to black first
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // logical coordinate transform (dpr * fit-scale, letterbox offset)
  ctx.setTransform(view.s, 0, 0, view.s, view.tx, view.ty);

  // screen background, ambient parallax, then the level wash on top
  ctx.fillStyle = CONFIG.BG;
  ctx.fillRect(0, 0, CONFIG.LOGICAL_W, CONFIG.LOGICAL_H);
  drawBackdrop();
  if (game.state !== 'START' && game.level > 1) {
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = LEVEL_TINTS[(game.level - 2) % LEVEL_TINTS.length];
    ctx.fillRect(0, 0, CONFIG.LOGICAL_W, CONFIG.LOGICAL_H);
    ctx.globalAlpha = 1;
  }

  // screen shake nudges everything drawn after the background
  const sht = (performance.now() - game.shakeAt) / CONFIG.SHAKE_MS;
  if (sht < 1) {
    const m = game.shakeMag * (1 - sht);
    ctx.translate((Math.random() * 2 - 1) * m, (Math.random() * 2 - 1) * m);
  }

  if (game.state === 'START') {
    // after enough idle the self-playing demo takes over from the drift
    const now = performance.now();
    attract.on = !REDUCED_MOTION && now - game.idleAt > CONFIG.ATTRACT_MS;
    if (attract.on) {
      const adt = attract.lastT ? Math.min(0.05, (now - attract.lastT) / 1000) : 0.016;
      attractStep(adt);
      drawAttract();
    } else {
      drawTitleDrift();
    }
    attract.lastT = now;
  }

  if (game.state !== 'START') {
    drawObstacle();
  }
  drawWell();
  if (!attract.on || game.state !== 'START') drawStack();
  // the danger band reflects a live run; the title shows only leftovers
  if (game.state !== 'START') drawDanger();
  drawClearFlash();
  if (game.state === 'FLYING' || game.state === 'PAUSED' || game.state === 'RESUMING') {
    drawGhost();
    drawGhostRun();
  }
  if (game.state !== 'START') {
    if (game.state === 'FLYING') drawTrail();
    drawPiece();
    drawHUD();
    if (game.state === 'FLYING') drawTutorial();
    drawParticles();
    drawHitFlash();
  }
  // help and badge panels replace the state overlay under them entirely, so
  // no text bleeds through and no hidden buttons stay registered
  const panelUp = game.helpOpen || game.badgesOpen;
  if (!panelUp) {
    if (game.state === 'START') drawStartOverlay();
    else if (game.state === 'PAUSED') drawPauseOverlay();
    else if (game.state === 'RESUMING') drawResumeOverlay();
    else if (game.state === 'GAMEOVER') {
      // death beat: hold on the crash for a moment, then fade the overlay in.
      // A victory finish has no crash to linger on, so it skips the hold.
      const beat = game.finish ? 0 : CONFIG.DEATH_BEAT_MS;
      const t = performance.now() - game.gameOverAt;
      if (t > beat) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, (t - beat) / 150);
        drawGameOverOverlay();
        ctx.restore();
      }
    }
  }
  // floaters draw above the overlays so copy/volume feedback stays readable
  // on the game over and pause screens
  if (game.state !== 'START') drawFloaters();
  drawToasts();
  if (game.helpOpen) drawHelpOverlay();
  else if (game.badgesOpen) drawBadgesOverlay();
}

// ---------------------------------------------------------------------------
// Main loop: fixed-timestep accumulator, render every frame
// ---------------------------------------------------------------------------

// the digit shown and blipped during the unpause countdown
function resumeCount() {
  return Math.max(1, Math.ceil(game.resumeLeft / (CONFIG.RESUME_MS / 3)));
}

let lastTime = null;
let accumulator = 0;
const STEP_MS = 1000 / 60;

function frame(now) {
  if (lastTime === null) lastTime = now;
  let dt = now - lastTime;
  lastTime = now;
  if (dt > 250) dt = 250; // avoid a spiral of death after a tab stall

  pollGamepad();

  // unpause countdown: burns down on rendered time only, so a rAF stall
  // (occluded window, display sleep) freezes it exactly like physics
  if (game.state === 'RESUMING') {
    game.resumeLeft -= dt;
    const count = resumeCount();
    if (count !== game.lastCount) { game.lastCount = count; SFX.rotate(); }
    if (game.resumeLeft <= 0) { game.state = 'FLYING'; accumulator = 0; }
  }

  scheduleMusic();

  if (game.state === 'FLYING') {
    accumulator += dt;
    while (accumulator >= STEP_MS) {
      step(STEP_MS / 1000);
      accumulator -= STEP_MS;
      if (game.state !== 'FLYING') { accumulator = 0; break; }
    }
  } else {
    accumulator = 0;
  }

  render();
  requestAnimationFrame(frame);
}

// ---------------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------------

// Restart stays blocked until the score screen has actually been shown:
// deaths hold through the beat plus the fade, victory finishes skip the beat.
function goLockoutMs() {
  return game.finish ? CONFIG.GAMEOVER_LOCKOUT
    : Math.max(CONFIG.GAMEOVER_LOCKOUT, CONFIG.DEATH_BEAT_MS + 150);
}

function primaryAction() {
  if (game.state === 'START') {
    startRun();
  } else if (game.state === 'FLYING') {
    flap();
  } else if (game.state === 'GAMEOVER') {
    if (performance.now() - game.gameOverAt >= goLockoutMs()) startRun();
  }
}

    const key = f[0];
    const row = document.createElement('div');
    row.style.cssText = 'margin-bottom:6px;';

    input.step = f[3];
    input.value = CONFIG[key];
    input.style.cssText = 'width:100%;';
    input.addEventListener('input', () => {
      CONFIG[key] = parseFloat(input.value);

  const btnCss = 'font:12px ' + MONO + ';margin-right:6px;background:rgba(237,232,220,0.08);' +
    'color:#EDE8DC;border:1px solid #39424E;border-radius:4px;padding:3px 8px;cursor:pointer;';
  const copyBtn = document.createElement('button');
  copyBtn.textContent = 'copy diff';
  copyBtn.style.cssText = btnCss;
  copyBtn.addEventListener('click', () => {
    const changed = [];
    for (const f of TUNE_FIELDS) {
      const k = f[0];
      if (CONFIG[k] !== CONFIG_DEFAULTS[k]) changed.push('  ' + k + ': ' + CONFIG[k] + ',');
    }
    const text = changed.length ? changed.join('\n') : '(no changes)';
    const done = (msg) => {
      copyBtn.textContent = msg;
      setTimeout(() => { copyBtn.textContent = 'copy diff'; }, 900);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => done('copied!'), () => done('copy failed'));
    } else {
      done('unavailable');
    }
  });
  const resetBtn = document.createElement('button');
  resetBtn.textContent = 'reset';
  resetBtn.style.cssText = btnCss;
  resetBtn.addEventListener('click', () => {
    for (const f of TUNE_FIELDS) CONFIG[f[0]] = CONFIG_DEFAULTS[f[0]];
    el.remove();
    tunePanel = null;
    toggleTunePanel();
  });
  const btns = document.createElement('div');
  btns.appendChild(copyBtn);
  btns.appendChild(resetBtn);
  el.appendChild(btns);
  document.body.appendChild(el);
  tunePanel = el;
}

window.addEventListener('keydown', (e) => {
  // leave browser shortcuts alone (copy, reload, new window, ...)
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  // let the tuning panel's controls keep their own keyboard behavior
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' ||
                   e.target.tagName === 'TEXTAREA')) return;
  game.idleAt = performance.now();
  // an open help or badge panel swallows the keyboard until it is closed
  if (game.helpOpen || game.badgesOpen) {
    if (e.code === 'Space' || e.key === 'Escape' || e.code === 'Slash' ||
        e.key === 'b' || e.key === 'B') {
      e.preventDefault();
      game.helpOpen = false;
      game.badgesOpen = false;
    }
    return;
  }
  if (e.code === 'Space') {
    e.preventDefault();
    primaryAction();
  } else if (e.key === 'r' || e.key === 'R' || e.code === 'ArrowUp') {
    e.preventDefault();
    tryRotate();
  } else if (e.code === 'ArrowDown') {
    e.preventDefault();
    dive();
  } else if (e.code === 'Slash') {
    // help from anywhere; opening it mid-flight or mid-countdown parks the
    // run in pause so it can never resume behind the panel
    e.preventDefault();
    if (game.state === 'FLYING' || game.state === 'RESUMING') game.state = 'PAUSED';
    game.helpOpen = true;
  } else if (e.key === 'b' || e.key === 'B') {
    e.preventDefault();
    if (betweenRuns()) game.badgesOpen = true;
  } else if (e.code === 'Minus' || e.code === 'Equal') {
    e.preventDefault();
    setVolume(audio.vol + (e.code === 'Minus' ? -0.1 : 0.1));
    addFloater(CONFIG.LOGICAL_W / 2, 130, 'VOL ' + Math.round(audio.vol * 100) + '%');
  } else if (e.key === 'p' || e.key === 'P' || e.code === 'KeyP') {
    e.preventDefault();
    togglePause();
  } else if (e.key === 'x' || e.key === 'X') {
    e.preventDefault();
    copyCard();
  } else if (e.key === 'g' || e.key === 'G') {
    e.preventDefault();
    ghostHidden = !ghostHidden;
    lsSet('flapstack.ghostoff', ghostHidden ? '1' : '0');
    if (game.state !== 'START') {
      addFloater(CONFIG.LOGICAL_W / 2, 130, ghostHidden ? 'GHOST OFF' : 'GHOST ON');
    }
  } else if (e.code === 'BracketLeft' || e.code === 'BracketRight') {
    e.preventDefault();
    // zen practice speed control; a fixed pace is part of every other mode
    if (game.mode === 'zen' && (game.state === 'FLYING' || game.state === 'PAUSED')) {
      const v = Math.max(60, Math.min(260,
        game.scrollSpeed + (e.code === 'BracketRight' ? 10 : -10)));
      game.scrollSpeed = v;
      lsSet('flapstack.zenspeed', String(v));
      addFloater(CONFIG.LOGICAL_W / 2, 130, 'SPEED ' + v);
    }
  } else if (e.key === 'h' || e.key === 'H' || e.key === 'Shift') {
    e.preventDefault();
    tryHold();
  } else if (e.key === 'm' || e.key === 'M') {
    e.preventDefault();
    toggleMute();
  } else if (e.key === 'n' || e.key === 'N') {
    e.preventDefault();
    toggleMusic();
  } else if (e.key === 'c' || e.key === 'C') {
    e.preventDefault();
    game.cbMode = !game.cbMode;
    lsSet('flapstack.cb', game.cbMode ? '1' : '0');
  } else if (e.key === 'd' || e.key === 'D') {
    e.preventDefault();
    toggleMode();
  } else if (e.key === 's' || e.key === 'S') {
    e.preventDefault();
    copyResult();
  } else if (e.key === 't' || e.key === 'T') {
    e.preventDefault();
    toggleTunePanel();
  } else if (e.key >= '1' && e.key <= '5') {
    e.preventDefault();
    replayHistory(e.key.charCodeAt(0) - 49);
  } else if (e.key === 'Escape') {
    e.preventDefault();
    if (game.state === 'FLYING' || game.state === 'PAUSED' || game.state === 'RESUMING') gameOver();
  }
});

// Losing window focus mid-flight pauses automatically so the piece is not
// left falling unattended.
window.addEventListener('blur', () => {
  if (game.state === 'FLYING' || game.state === 'RESUMING') game.state = 'PAUSED';
});

// map a mouse event to logical game coordinates through the letterbox
function eventPoint(e) {
  const rect = canvas.getBoundingClientRect();
  const bs = canvas.width / rect.width; // css px -> backing px
  return {
    x: ((e.clientX - rect.left) * bs - view.tx) / view.s,
    y: ((e.clientY - rect.top) * bs - view.ty) / view.s,
  };
}

canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  canvas.focus();
  game.idleAt = performance.now();
  // an open panel closes on any click, and never leaks one to the buttons
  if (game.helpOpen || game.badgesOpen) {
    game.helpOpen = false;
    game.badgesOpen = false;
    return;
  }
  const pt = eventPoint(e);
  for (const b of game.uiButtons) {
    if (pt.x >= b.x && pt.x <= b.x + b.w && pt.y >= b.y && pt.y <= b.y + b.h) {
      b.action();
      return;
    }
  }
  primaryAction();
});

// ---------------------------------------------------------------------------
// In-page regression suite: open index.html?test=1 to run it. Drives the
// game through window.__game exactly like external automation would, then
// restores storage and constants and reports into a panel on the page plus
// window.__testResults for scripts.
// ---------------------------------------------------------------------------

function runTestSuite() {
  const G = window.__game;
  const W = G.wellRect();
  const DT = 1 / 60;
  const savedStorage = {};
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf('flapstack') === 0) savedStorage[k] = localStorage.getItem(k);
    }
  } catch (e) {}
  const savedConfig = JSON.parse(JSON.stringify(CONFIG));

  const clearWell = () => {
    for (let r = 0; r < W.rows; r++) for (let c = 0; c < W.cols; c++) G.grid[r][c] = null;
  };
  const press = (code, k, mods) => window.dispatchEvent(new KeyboardEvent('keydown',
    Object.assign({ code: code, key: k, bubbles: true, cancelable: true }, mods || {})));
  const runTo = (max) => {
    const lk0 = G.lockEvents.length, lv0 = G.lives;
    for (let s = 0; s < max; s++) {
      G.step(DT);
      if (G.lockEvents.length > lk0) return { locked: true, ev: G.lockEvents[G.lockEvents.length - 1] };
      if (G.lives < lv0) return { lifeLost: true };
      if (G.state === 'GAMEOVER') return { gameover: true };
    }
    return { timeout: true };
  };
  const ok = (cond, msg) => { if (!cond) throw new Error(msg); };
  const toMode = (m) => { game.mode = m; if (m === 'daily') loadDailyBest(); };
  const clearingLock = (col) => {
    clearWell(); G.debugFillRow(15, col);
    G.setPiece(0, 1, W.x + col * W.cell, W.b - 4 * W.cell - 1, 200);
    const s0 = G.score; runTo(40); return G.score - s0;
  };

  const tests = [];
  const T = (name, fn) => tests.push([name, fn]);

  T('boot surface: obstacle null, no phantom pass', () => {
    ok(G.obstacle === null, 'obstacle not null at boot');
    G.setPiece(1, 0, 700, 250, 0);
    const s0 = G.score;
    for (let s = 0; s < 5; s++) G.step(DT);
    ok(G.score - s0 === 0 && G.stats.passes === 0, 'phantom pass awarded');
  });

  T('seven shapes floor-lock +25, supported, on grid', () => {
    for (let idx = 0; idx < 7; idx++) {
      G.start(); clearWell();
      G.setPiece(idx, 0, W.x + 2 * W.cell, W.b - 4 * W.cell + 2, 120);
      const s0 = G.score;
      const r = runTo(120);
      ok(r.locked, 'shape ' + idx + ' did not lock');
      ok(r.ev.supported, 'shape ' + idx + ' unsupported');
      ok(r.ev.cells.every(c => Number.isInteger(c.c) && Number.isInteger(c.r)), 'shape ' + idx + ' off grid');
      ok(G.score - s0 === 25, 'shape ' + idx + ' delta ' + (G.score - s0));
    }
  });

  T('combo 125/175/225, barren 25 resets', () => {
    G.start();
    ok(clearingLock(5) === 125, 'first clear');
    ok(clearingLock(6) === 175, 'second clear');
    ok(clearingLock(7) === 225, 'third clear');
    clearWell(); G.setPiece(1, 0, W.x + 2 * W.cell, W.b - 2 * W.cell - 3, 200);
    const s0 = G.score; runTo(30);
    ok(G.score - s0 === 25, 'barren delta ' + (G.score - s0));
    ok(G.combo === 0, 'combo not reset');
    ok(clearingLock(5) === 125, 'combo did not restart');
  });

  T('all-clear 625 and empty well', () => {
    G.start(); clearWell();
    for (let c = 0; c < W.cols; c++) if (c < 3 || c > 6) G.grid[15][c] = '#8A8F98';
    G.setPiece(0, 0, W.x + 3 * W.cell, W.b - W.cell - 2, 200);
    const s0 = G.score; const r = runTo(40);
    ok(r.locked && G.score - s0 === 625, 'delta ' + (G.score - s0));
    ok(G.grid.every(row => row.every(x => x === null)), 'well not empty');
  });

  T('wall settle +15, supported', () => {
    G.start(); clearWell();
    G.setPiece(1, 0, W.r - 2 * W.cell - 2, W.y + 4 * W.cell, -100);
    const s0 = G.score; const r = runTo(200);
    ok(r.locked && r.ev.supported && G.score - s0 === 15, 'settle failed');
  });

  T('side settle locks without heart loss', () => {
    G.start(); clearWell();
    for (let r = 0; r < W.rows; r++) G.grid[r][6] = '#8A8F98';
    G.setPiece(0, 0, W.x + 1 * W.cell, W.y + 5 * W.cell, 0);
    let res = null;
    for (let s = 0; s < 300; s++) {
      if (s % 6 === 0 && !G.settling) G.flap();
      const lk = G.lockEvents.length; G.step(DT);
      if (G.lockEvents.length > lk) { res = 'locked'; break; }
      if (G.lives < 3) { res = 'died'; break; }
    }
    ok(res === 'locked', String(res));
  });

  T('entrance side-hit crashes', () => {
    G.start(); clearWell();
    for (let r = 8; r < W.rows; r++) G.grid[r][0] = '#8A8F98';
    CONFIG.GRAVITY = 0;
    G.setPiece(0, 0, W.x - 4 * W.cell - 10, W.y + 10 * W.cell, 0);
    let res = null;
    for (let s = 0; s < 300; s++) {
      const lk = G.lockEvents.length; G.step(DT);
      if (G.lockEvents.length > lk) { res = 'locked'; break; }
      if (G.lives < 3) { res = 'died'; break; }
    }
    CONFIG.GRAVITY = savedConfig.GRAVITY;
    ok(res === 'died', String(res));
  });

  T('well ceiling bumps instead of killing', () => {
    G.start(); clearWell();
    G.setPiece(1, 0, W.x + 3 * W.cell, W.y + 2 * W.cell, -600);
    let minY = 999;
    for (let s = 0; s < 40; s++) {
      G.step(DT); minY = Math.min(minY, G.piece.oy);
      if (G.state !== 'FLYING' || G.lives < 3) break;
    }
    ok(G.lives === 3 && G.state === 'FLYING' && minY >= W.y - 0.01, 'bump failed');
  });

  T('three crashes end the run', () => {
    G.start(); clearWell();
    for (let n = 0; n < 3; n++) { G.setPiece(2, 0, CONFIG.OBSTACLE_X + 5, 5, 0); runTo(30); }
    ok(G.state === 'GAMEOVER' && G.lives === 0, G.lives + '/' + G.state);
  });

  T('top-out ends despite full hearts', () => {
    G.start(); clearWell();
    for (let r = 3; r < W.rows; r++) G.grid[r][4] = '#8A8F98';
    G.setPiece(1, 0, W.x + 4 * W.cell, W.y + 1, 150);
    let topped = false;
    for (let s = 0; s < 60; s++) {
      G.step(DT);
      if (G.state === 'GAMEOVER') { topped = true; break; }
      if (G.lives < 3) break;
    }
    ok(topped && G.lives === 3, 'lives ' + G.lives);
  });

  T('clear restores a heart, capped at 5', () => {
    G.start(); clearWell();
    G.setPiece(2, 0, CONFIG.OBSTACLE_X + 5, 5, 0); runTo(30);
    ok(G.lives === 2, 'setup lives ' + G.lives);
    clearingLock(5);
    ok(G.lives === 3, 'heart not restored');
    clearingLock(6); clearingLock(7); clearingLock(4);
    ok(G.lives === 5, 'cap wrong: ' + G.lives);
  });

  T('garbage rises on cadence with one hole', () => {
    G.start();
    for (let n = 0; n < 12; n++) {
      clearWell();
      G.setPiece(1, 0, W.x + (n % 4) * 2 * W.cell, W.b - 2 * W.cell - 3, 220);
      runTo(40);
    }
    const g = G.grid[15].filter(c => c === CONFIG.GARBAGE).length;
    const holes = G.grid[15].filter(c => c === null).length;
    ok(G.stats.pieces === 12 && g === 9 && holes === 1, g + ' garbage / ' + holes + ' holes');
  });

  T('rise into occupied top row is a top-out', () => {
    G.start(); clearWell();
    G.grid[0][3] = '#8A8F98';
    CONFIG.RISE_START = G.stats.pieces + 1;
    G.setPiece(1, 0, W.x + 5 * W.cell, W.b - 2 * W.cell - 3, 200);
    let ended = false;
    for (let s = 0; s < 40; s++) { G.step(DT); if (G.state === 'GAMEOVER') { ended = true; break; } }
    CONFIG.RISE_START = savedConfig.RISE_START;
    ok(ended, 'run did not end');
  });

  T('second pipe appears and collides', () => {
    CONFIG.OBSTACLE2_START = 0;
    G.start(); clearWell();
    ok(G.obstacles.length === 2 && G.obstacles[1].x === CONFIG.OBSTACLE2_X, 'no second pipe');
    G.setPiece(2, 0, CONFIG.OBSTACLE2_X + 5, 5, 0);
    const r = runTo(30);
    CONFIG.OBSTACLE2_START = savedConfig.OBSTACLE2_START;
    ok(r.lifeLost, 'no collision with pipe 2');
  });

  T('clean pass +15 center, +10 edge', () => {
    CONFIG.GRAVITY = 0;
    G.start(); clearWell();
    let ob = G.obstacles[0];
    G.setPiece(1, 0, 150, (ob.gapTop + ob.gapBottom) / 2 - W.cell, 0);
    let s0 = G.score;
    for (let s = 0; s < 400; s++) { G.step(DT); if (G.stats.passes > 0 || G.lives < 3) break; }
    const center = G.score - s0;
    G.start(); clearWell();
    ob = G.obstacles[0];
    G.setPiece(1, 0, 150, ob.gapTop + 2, 0);
    s0 = G.score;
    for (let s = 0; s < 400; s++) { G.step(DT); if (G.stats.passes > 0 || G.lives < 3) break; }
    const edge = G.score - s0;
    CONFIG.GRAVITY = savedConfig.GRAVITY;
    ok(center === 15 && edge === 10, center + '/' + edge);
  });

  T('clean pass fair while the gap drifts', () => {
    CONFIG.GRAVITY = 0;
    G.start(); clearWell();
    for (const o of G.obstacles) { o.amp = 40; o.phase = 0; }
    const ob = G.obstacles[0];
    G.setPiece(1, 0, 150, (ob.gapTop + ob.gapBottom) / 2 - W.cell, 0);
    const s0 = G.score;
    for (let s = 0; s < 500; s++) {
      G.piece.oy = (ob.gapTop + ob.gapBottom) / 2 - W.cell;
      G.step(DT);
      if (G.stats.passes > 0 || G.lives < 3) break;
    }
    CONFIG.GRAVITY = savedConfig.GRAVITY;
    ok(G.score - s0 === 15, 'delta ' + (G.score - s0));
  });

  T('hold stashes, once per flight, swaps back', () => {
    G.start(); clearWell();
    const orig = G.piece.shapeIndex, incoming = G.nextQueue[0];
    G.setPiece(orig, 0, 150, 250, 0);
    press('KeyH', 'h');
    ok(G.hold === orig && G.piece.shapeIndex === incoming && G.canHold === false, 'first hold');
    press('KeyH', 'h');
    ok(G.hold === orig && G.piece.shapeIndex === incoming, 'second hold not ignored');
    clearWell();
    G.setPiece(G.piece.shapeIndex, 0, W.x + 2 * W.cell, W.b - 2 * W.cell - 3, 200);
    runTo(40);
    ok(G.canHold === true, 'hold not recharged');
    G.setPiece(G.piece.shapeIndex, 0, 150, 250, 0);
    press('Shift', 'Shift');
    ok(G.piece.shapeIndex === orig, 'swap back failed');
  });

  T('queue stays 3 deep', () => {
    G.start();
    ok(G.nextQueue.length === 3, 'boot queue');
    clearWell();
    G.setPiece(1, 0, W.x + 2 * W.cell, W.b - 2 * W.cell - 3, 200);
    runTo(30);
    ok(G.nextQueue.length === 3, 'after lock');
  });

  T('wall kick: blocked rotation succeeds shifted', () => {
    G.start(); clearWell();
    for (let r = 8; r < W.rows; r++) G.grid[r][7] = '#8A8F98';
    G.setPiece(0, 1, W.x + 5 * W.cell, W.y + 10 * W.cell, 0);
    const rot0 = G.piece.rot;
    press('KeyR', 'r');
    ok(G.piece.rot === (rot0 + 1) % 4, 'rotation stayed blocked');
  });

  T('zen: no pipes, no heart loss, top-out sweeps', () => {
    toMode('zen');
    G.start();
    ok(G.obstacles.length === 0, 'pipes in zen');
    clearWell();
    G.setPiece(1, 0, 100, 460, 300);
    for (let s = 0; s < 60; s++) G.step(DT);
    ok(G.lives === 3, 'heart lost in zen');
    clearWell();
    for (let r = 3; r < W.rows; r++) G.grid[r][4] = '#8A8F98';
    G.setPiece(1, 0, W.x + 4 * W.cell, W.y + 1, 150);
    let swept = false;
    for (let s = 0; s < 80; s++) {
      G.step(DT);
      if (G.state !== 'FLYING') break;
      if (G.lockEvents.length > 0 && G.grid.every(row => row.every(c => c === null))) { swept = true; break; }
    }
    ok(swept && G.state === 'FLYING', 'zen top-out did not sweep');
    ok(G.danger === false, 'danger flag stuck after the zen sweep');
    press('Escape', 'Escape');
    toMode('free');
  });

  T('daily determinism', () => {
    toMode('daily');
    G.start();
    const a = { f: G.piece.shapeIndex, q: G.nextQueue.join(','), top: G.obstacles[0].baseTop };
    G.start();
    ok(G.piece.shapeIndex === a.f && G.nextQueue.join(',') === a.q &&
       G.obstacles[0].baseTop === a.top, 'daily runs differ');
    press('Escape', 'Escape');
    toMode('free');
  });

  T('seed mode: deterministic, records untouched', () => {
    game.customSeed = 999;
    toMode('seed');
    const bestBefore = G.best;
    G.start();
    ok(G.lastSeed === 999, 'seed not used');
    const f1 = G.piece.shapeIndex;
    G.start();
    ok(G.piece.shapeIndex === f1, 'seed runs differ');
    clearingLock(5);
    press('Escape', 'Escape');
    ok(G.best === bestBefore, 'seed run touched records');
    toMode('free');
  });

  T('forceLock scores +5', () => {
    G.start(); clearWell();
    G.setPiece(1, 0, W.x + 2 * W.cell, W.b - 2 * W.cell, 0);
    const s0 = G.score;
    G.forceLock();
    ok(G.score - s0 === 5, 'delta ' + (G.score - s0));
  });

  T('pause, countdown, Esc flow', () => {
    G.start();
    press('KeyP', 'p');
    ok(G.state === 'PAUSED', 'not paused');
    press('KeyP', 'p');
    ok(G.state === 'RESUMING', 'not resuming');
    for (let s = 0; s < 30; s++) G.step(DT);
    ok(G.state === 'RESUMING', 'countdown burned without frames');
    press('Escape', 'Escape');
    ok(G.state === 'GAMEOVER', 'esc failed');
  });

  T('modifier shortcuts pass through', () => {
    const cb = G.cbMode;
    press('KeyC', 'c', { metaKey: true });
    press('KeyC', 'c', { ctrlKey: true });
    ok(G.cbMode === cb, 'modifier toggled letters');
  });

  T('history records runs, digits replay', () => {
    toMode('free');
    G.start();
    clearingLock(5);
    press('Escape', 'Escape');
    ok(runHistory.length > 0 && runHistory[0].seed === G.lastSeed, 'history not recorded');
    const seed = runHistory[0].seed;
    press('Digit1', '1');
    ok(G.state === 'FLYING' && G.mode === 'seed' && G.lastSeed === seed, 'digit replay failed');
    press('Escape', 'Escape');
    toMode('free');
  });

  T('dive sets fall speed, never slows a faster fall', () => {
    G.start(); clearWell();
    G.setPiece(1, 0, 150, 250, 0);
    G.dive();
    ok(G.piece.vy === CONFIG.DIVE_VY, 'vy ' + G.piece.vy);
    G.setPiece(1, 0, 150, 250, 550);
    G.dive();
    ok(G.piece.vy === 550, 'dive slowed a faster fall');
  });

  T('volume clamps to 0..1 and persists', () => {
    G.setVolume(2);
    ok(G.volume === 1, 'high clamp ' + G.volume);
    G.setVolume(-0.4);
    ok(G.volume === 0, 'low clamp ' + G.volume);
    G.setVolume(0.7);
    ok(G.volume === 0.7 && lsGet('flapstack.vol') === '0.7', 'persist failed');
  });

  T('level steps at every tenth line', () => {
    toMode('free');
    G.start();
    ok(G.level === 1, 'boot level ' + G.level);
    game.lines = 9;
    clearingLock(5);
    ok(G.lines === 10 && G.level === 2, G.lines + ' lines, level ' + G.level);
  });

  T('sprint: reaching the target finishes and records', () => {
    toMode('sprint');
    game.sprintBest = 0;
    try { localStorage.removeItem('flapstack.sprint'); } catch (e) {}
    G.start();
    ok(G.attackLeft === 0, 'attack timer armed in sprint');
    game.lines = CONFIG.SPRINT_LINES - 1;
    clearingLock(5);
    ok(G.state === 'GAMEOVER' && G.finish === 'FINISH!', G.state + '/' + G.finish);
    ok(G.sprintBest > 0 && lsGet('flapstack.sprint') === String(G.sprintBest), 'record missing');
    toMode('free');
  });

  T('attack: timer ends the run and records the score', () => {
    toMode('attack');
    game.attackBest = 0;
    try { localStorage.removeItem('flapstack.attack'); } catch (e) {}
    G.start();
    ok(Math.abs(G.attackLeft - CONFIG.ATTACK_TIME) < 0.001, 'timer not armed');
    clearingLock(5);
    ok(G.state === 'FLYING', 'died during setup');
    game.attackLeft = 0.01; // less than one step of clock left
    G.step(DT);
    ok(G.state === 'GAMEOVER' && G.finish === 'TIME UP!', G.state + '/' + G.finish);
    ok(G.attackBest === G.score && lsGet('flapstack.attack') === String(G.score), 'record missing');
    toMode('free');
  });

  T('mode cycle covers every mode and wraps', () => {
    press('Escape', 'Escape');
    toMode('free');
    const seen = [];
    const total = modeList().length;
    for (let i = 0; i < total; i++) { G.toggleMode(); seen.push(G.mode); }
    ok(seen.indexOf('daily') >= 0 && seen.indexOf('zen') >= 0 &&
       seen.indexOf('sprint') >= 0 && seen.indexOf('attack') >= 0, seen.join(','));
    ok(seen[seen.length - 1] === 'free', 'no wrap: ' + seen.join(','));
  });

  T('badges: earn once, persist, zen never awards', () => {
    const savedBadges = JSON.stringify(badges);
    badges = {};
    lsSet('flapstack.badges', '{}');
    toMode('zen');
    G.start();
    award('quad');
    ok(!badges['quad'], 'zen awarded a badge');
    press('Escape', 'Escape');
    toMode('free');
    G.start();
    game.toasts.length = 0; // earlier awards may have filled the toast cap
    award('quad');
    ok(!!badges['quad'], 'award failed');
    ok(game.toasts.length === 1, 'no unlock toast');
    award('quad');
    ok(game.toasts.length === 1, 'double award');
    ok(!!JSON.parse(lsGet('flapstack.badges'))['quad'], 'not persisted');
    press('Escape', 'Escape');
    badges = JSON.parse(savedBadges);
  });

  T('help overlay parks a flight in pause', () => {
    toMode('free');
    G.start();
    press('Slash', '?');
    ok(G.helpOpen === true && G.state === 'PAUSED', G.state + ' open=' + G.helpOpen);
    press('Escape', 'Escape');
    ok(G.helpOpen === false && G.state === 'PAUSED', 'esc hit the run, not the panel');
    press('Escape', 'Escape');
    ok(G.state === 'GAMEOVER', 'second esc should end the run');
    // opening help mid-countdown must also park, or the run resumes
    // invisibly behind the panel
    G.start();
    press('KeyP', 'p');
    press('KeyP', 'p');
    ok(G.state === 'RESUMING', 'countdown not armed');
    press('Slash', '?');
    ok(G.helpOpen === true && G.state === 'PAUSED', 'help left the countdown burning');
    press('Escape', 'Escape');
    press('Escape', 'Escape');
  });

  T('first-run hints advance and retire for good', () => {
    const g0 = life.games;
    life.games = 0;
    try { localStorage.removeItem('flapstack.tut'); } catch (e) {}
    toMode('free');
    G.start();
    ok(G.tutStep === 0, 'hints did not arm');
    G.flap(); G.flap(); G.flap();
    ok(G.tutStep === 1, 'flaps did not advance hints');
    clearWell();
    G.setPiece(1, 0, W.x + 2 * W.cell, W.b - 2 * W.cell - 3, 200);
    runTo(40);
    ok(G.tutStep === 2, 'lock did not advance hints');
    press('Escape', 'Escape');
    ok(lsGet('flapstack.tut') === '1' && G.tutStep === null, 'hints not retired');
    life.games = g0;
  });

  T('trail samples only at speed, cleared on lock', () => {
    if (REDUCED_MOTION) return; // sampling is disabled entirely then
    toMode('free');
    G.start();
    for (let s = 0; s < 8; s++) G.step(DT);
    ok(G.trailLength === 0, 'sampled below the trail speed');
    game.scrollSpeed = CONFIG.TRAIL_MIN_SPEED;
    for (let s = 0; s < 8; s++) G.step(DT);
    ok(G.trailLength > 0, 'no samples collected');
    clearWell();
    G.setPiece(1, 0, W.x + 2 * W.cell, W.b - 2 * W.cell - 3, 200);
    runTo(40);
    ok(G.trailLength === 0, 'not cleared: ' + G.trailLength);
  });

  T('zen history replays use the recorded seed', () => {
    toMode('zen');
    G.start();
    const seed = G.lastSeed;
    clearingLock(5);
    press('Escape', 'Escape');
    ok(runHistory[0] && runHistory[0].mode === 'zen', 'zen run not in history');
    press('Digit1', '1');
    ok(G.state === 'FLYING' && G.mode === 'zen' && G.lastSeed === seed,
       'zen replay seed mismatch: ' + G.lastSeed + ' vs ' + seed);
    press('Escape', 'Escape');
    toMode('free');
  });

  T('pause menu: restart and title bank the run quietly', () => {
    toMode('free');
    G.start();
    const games0 = life.games;
    togglePause();
    ok(G.state === 'PAUSED', 'not paused');
    pauseRestart();
    ok(G.state === 'FLYING' && life.games === games0 + 1, 'restart did not bank the run');
    togglePause();
    pauseToTitle();
    ok(G.state === 'START' && life.games === games0 + 2, 'title did not bank the run');
  });

  T('gamepad: edges fire once, start toggles pause', () => {
    toMode('free');
    G.start();
    G.padStep({});
    G.padStep({ 0: true });
    ok(G.piece.vy === CONFIG.FLAP_VY, 'pad flap failed: ' + G.piece.vy);
    G.step(DT);
    const v1 = G.piece.vy;
    G.padStep({ 0: true }); // still held: must not re-fire
    ok(G.piece.vy === v1, 'held button re-fired');
    G.padStep({ 0: false });
    G.padStep({ 9: true });
    ok(G.state === 'PAUSED', 'pad pause failed');
    G.padStep({ 9: false });
    G.padStep({ 9: true });
    ok(G.state === 'RESUMING', 'pad resume failed');
    G.padStep({});
    press('Escape', 'Escape');
    // with a panel up, a pad press only closes the panel
    G.start();
    press('KeyP', 'p');
    press('Slash', '?');
    ok(G.helpOpen === true && G.state === 'PAUSED', 'panel setup failed');
    G.padStep({ 9: true });
    ok(G.helpOpen === false && G.state === 'PAUSED', 'pad start leaked through the panel');
    G.padStep({});
    press('Escape', 'Escape');
  });

  T('ghost race: best attempt replays on the same seed', () => {
    try { localStorage.removeItem('flapstack.ghosts'); } catch (e) {}
    ghostCache = null; // drop the cache along with the key
    game.customSeed = 4242;
    toMode('seed');
    G.start();
    for (let s = 0; s < 150; s++) {
      if (s % 8 === 0) G.flap();
      G.step(DT);
    }
    ok(G.recLength >= 10, 'too few samples: ' + G.recLength);
    clearingLock(5);
    press('Escape', 'Escape');
    ok(!!lsGet('flapstack.ghosts'), 'ghost not saved');
    G.start(); // same seed
    ok(!!G.ghostRace && G.ghostRace.samples >= 10, 'ghost not armed');
    const t0 = G.ghostRace.t;
    for (let s = 0; s < 10; s++) G.step(DT);
    ok(G.ghostRace.t > t0, 'ghost clock frozen');
    press('Escape', 'Escape');
    game.customSeed = null;
    toMode('free');
  });

  T('result card is a 640x360 image with pixels', () => {
    toMode('free');
    G.start();
    clearingLock(5);
    press('Escape', 'Escape');
    const card = buildResultCard();
    ok(card.width === 640 && card.height === 360, 'bad size');
    ok(card.toDataURL('image/png').length > 2000, 'card looks empty');
  });

  T('zen practice speed keys adjust, clamp, persist', () => {
    try { localStorage.removeItem('flapstack.zenspeed'); } catch (e) {}
    toMode('zen');
    G.start();
    const s0 = G.scrollSpeed;
    press('BracketRight', ']');
    ok(G.scrollSpeed === s0 + 10, 'speed up failed');
    press('BracketLeft', '[');
    press('BracketLeft', '[');
    ok(G.scrollSpeed === s0 - 10, 'speed down failed');
    ok(lsGet('flapstack.zenspeed') === String(s0 - 10), 'not persisted');
    press('Escape', 'Escape');
    toMode('free');
    G.start();
    ok(G.scrollSpeed === CONFIG.SCROLL_START, 'zen speed leaked into free');
    press('Escape', 'Escape');
  });

  T('attract demo stacks pieces without touching the game', () => {
    const games0 = life.games, score0 = G.score;
    attractReset();
    let steps = 0;
    while (steps < 6000 && attract.grid.every(row => row.every(c => !c))) {
      attractStep(DT);
      steps++;
    }
    ok(attract.grid.some(row => row.some(c => !!c)), 'no cells after ' + steps + ' steps');
    ok(life.games === games0 && G.score === score0, 'attract touched real state');
    attractReset();
  });

  T('stability: 1200 random steps, all locks supported', () => {
    G.start();
    for (let s = 0; s < 1200; s++) {
      if (G.state === 'GAMEOVER') G.start();
      if (s % 17 === 0) G.flap();
      if (s % 29 === 0) G.dive();
      if (s % 53 === 0) G.rotate();
      if (s % 71 === 0) G.holdSwap();
      G.step(DT);
    }
    ok(G.lockEvents.every(ev => ev.supported === true), 'unsupported lock seen');
  });

  const results = [];
  let passed = 0;
  for (const t of tests) {
    // per-test reset: quietly end any run the previous test left live and
    // normalize shared state, so tests cannot poison each other
    if (game.state !== 'START' && game.state !== 'GAMEOVER') gameOver('', true);
    game.mode = 'free';
    game.toasts.length = 0;
    try {
      t[1]();
      results.push({ name: t[0], pass: true });
      passed++;
    } catch (err) {
      results.push({ name: t[0], pass: false, err: String((err && err.message) || err) });
    }
  }

  // put the world back: storage keys and constants as they were
  try {
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.indexOf('flapstack') === 0 && !(k in savedStorage)) localStorage.removeItem(k);
    }
    for (const k in savedStorage) localStorage.setItem(k, savedStorage[k]);
  } catch (e) {}
  for (const k in savedConfig) CONFIG[k] = savedConfig[k];
  // and the in-memory mirrors, via the exact loaders boot uses so the
  // post-suite state can never drift from what a fresh page load would read
  loadBadges();
  streakN = loadStreak().n;
  loadLife();
  loadHistory();
  loadVolume();
  loadRecords();
  ghostCache = null; // lazily re-read from the restored storage
  ghostHidden = lsGet('flapstack.ghostoff') === '1';
  game.ghostRun = null;
  game.toasts.length = 0;
  // tests plant custom seeds; restore the URL-derived value (or none)
  game.customSeed = null;
  applySeedHash();
  // park on the title screen so the run the tests abandoned cannot keep
  // flying, die on its own, and write records into the restored storage
  game.state = 'START';
  game.mode = 'free';
  game.idleAt = performance.now();

  window.__testResults = { total: tests.length, passed: passed, failed: tests.length - passed, results: results };

  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;top:10px;left:10px;z-index:11;' +
    'background:rgba(20,25,34,0.96);color:#EDE8DC;font:12px ' + MONO + ';' +
    'padding:12px 14px;border:1px solid #39424E;border-radius:6px;' +
    'max-height:92vh;overflow:auto;width:400px;';
  const head = document.createElement('div');
  head.textContent = 'FLAPSTACK TEST SUITE  ' + passed + '/' + tests.length + ' passed';
  head.style.cssText = 'font-weight:bold;margin-bottom:8px;color:' +
    (passed === tests.length ? '#2D9C8A' : '#E0455A') + ';';
  box.appendChild(head);
  for (const r of results) {
    const line = document.createElement('div');
    line.textContent = (r.pass ? 'PASS  ' : 'FAIL  ') + r.name + (r.pass ? '' : '  [' + r.err + ']');
    line.style.cssText = 'color:' + (r.pass ? '#2D9C8A' : '#E0455A') + ';margin-bottom:2px;';
    box.appendChild(line);
  }
  const note = document.createElement('div');
  note.textContent = 'reload without ?test=1 to play';
  note.style.cssText = 'margin-top:8px;opacity:0.6;';
  box.appendChild(note);
  document.body.appendChild(box);
}

if (/[?&]test=1/.test(location.search)) {
  setTimeout(runTestSuite, 60);
}
</script>
</body>
</html>
